kind = "web"
previewPath = "/"
title = "MS Collection"
version = "1.0.0"
id = "artifacts/ms-collection"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23904

[services.development]
run = "pnpm --filter @workspace/ms-collection run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ms-collection", "run", "build" ]
publicDir = "artifacts/ms-collection/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23904"
BASE_PATH = "/"
